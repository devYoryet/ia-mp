# Panel del Clasificador IA — servir en iabot.pharmatender.cl (servidor gestor_oc).
# Instalar:
#   sudo cp deploy/nginx-iabot.conf /etc/nginx/sites-available/iabot.pharmatender.cl
#   sudo ln -s /etc/nginx/sites-available/iabot.pharmatender.cl /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Luego emitir el certificado:  sudo certbot --nginx -d iabot.pharmatender.cl

server {
    listen 80;
    server_name iabot.pharmatender.cl;

    # El panel es interno: protegerlo con auth básica (recomendado).
    #   sudo htpasswd -c /etc/nginx/.htpasswd-iabot <usuario>
    # y descomentar las dos líneas siguientes:
    # auth_basic           "Clasificador IA";
    # auth_basic_user_file /etc/nginx/.htpasswd-iabot;

    location / {
        proxy_pass         http://127.0.0.1:8800;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
